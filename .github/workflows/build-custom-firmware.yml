name: Build Custom Firmware

on:
  workflow_dispatch:  # Allows manual triggering from GitHub UI
    inputs:
      author_string:
        description: '呼号（用于开机显示和SysInf菜单，如：BD8CKF）'
        required: true
        default: 'bd8ckf'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Custom UV-K5 Firmware

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整的git历史以获取commit hash

    - name: Get commit hash
      id: commit
      run: echo "hash=$(git rev-parse HEAD | cut -c1-5)" >> $GITHUB_OUTPUT

    - name: Build custom firmware
      env:
        AUTHOR_STRING_2: ${{ inputs.author_string }}
        VERSION_STRING_2: ${{ steps.commit.outputs.hash }}
      run: |
        chmod +x ./compile-with-docker.sh
        ./compile-with-docker.sh custom

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: f4hwn-custom-firmware
        path: compiled-firmware/f4hwn.custom.packed.bin
        retention-days: 30
